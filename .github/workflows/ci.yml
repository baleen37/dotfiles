name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NIX_CONFIG: |
    max-jobs = auto
    cores = 0
    substituters = https://baleen-nix.cachix.org https://nix-community.cachix.org https://cache.nixos.org/
    trusted-public-keys = baleen-nix.cachix.org-1:awgC7Sut148An/CZ6TZA+wnUtJmJnOvl5NThGio9j5k= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
    narinfo-cache-negative-ttl = 0

jobs:
  ci:
    name: CI (${{ matrix.name }})
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Darwin
            os: macos-15
            arch: aarch64
          - name: Linux x64
            os: ubuntu-latest
            arch: x86_64
          - name: Linux ARM64
            os: ubuntu-latest
            arch: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0

      - name: Setup Nix with cache
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Install pre-commit
        run: |
          if command -v pre-commit &> /dev/null; then
            echo "pre-commit already installed"
          else
            pip install pre-commit
          fi

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Fast container tests
        continue-on-error: false
        run: |
          export USER=${USER:-ci}
          export TEST_USER=${TEST_USER:-testuser}  # Ensure consistent test user
          echo "Running fast container tests with static test user..."
          echo "Environment info:"
          echo "  - USER: $USER"
          echo "  - TEST_USER: $TEST_USER"
          echo "  - RUNNER_OS: $RUNNER_OS"
          make test || {
            echo "❌ Fast container tests failed"
            echo "This may be due to cache service issues, not code problems"
            exit 1
          }

      - name: Full test suite
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        continue-on-error: false
        run: |
          export USER=${USER:-ci}
          export TEST_USER=${TEST_USER:-testuser}  # Ensure consistent test user
          echo "Running full test suite with static test user..."
          echo "Environment info:"
          echo "  - USER: $USER"
          echo "  - TEST_USER: $TEST_USER"
          echo "  - RUNNER_OS: $RUNNER_OS"
          make test-all || {
            echo "❌ Full test suite failed"
            echo "This may be due to cache service issues, not code problems"
            exit 1
          }

      - name: Test secrets backup
        run: |
          export USER=${USER:-ci}
          echo "Testing secrets backup (dry-run)..."
          make -n secrets/backup

      - name: Build closure
        if: matrix.name == 'Linux x64' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: |
          export USER=${USER:-ci}
          if [ "$RUNNER_OS" = "macOS" ]; then
            export NIXNAME=macbook-pro
            ATTR='.#darwinConfigurations.macbook-pro.system'
          else
            if [ "${{ matrix.arch }}" = "x86_64" ]; then
              ATTR='.#nixosConfigurations.vm-x86_64-utm.config.system.build.toplevel'
            else
              ATTR='.#nixosConfigurations.vm-aarch64-utm.config.system.build.toplevel'
            fi
          fi
          echo "Building $ATTR ..."
          nix build "$ATTR" --impure --out-link result --print-build-logs

      - name: Cache hit-rate report
        if: matrix.name == 'Linux x64' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          OUT=$(readlink -f result 2>/dev/null || echo "")
          if [ -z "$OUT" ]; then
            echo "::warning::./result not found — skipping cache hit-rate report"
            exit 0
          fi
          TOTAL=$(nix path-info -r "$OUT" 2>/dev/null | wc -l | tr -d ' ')
          # `nix path-info -r --store <url>` prints only paths present at that
          # substituter on stdout (errors for missing paths go to stderr).
          # HIT = paths reachable from the union of our substituters.
          HIT=$( \
            { \
              nix path-info -r --store https://baleen-nix.cachix.org "$OUT" 2>/dev/null; \
              nix path-info -r --store https://nix-community.cachix.org "$OUT" 2>/dev/null; \
              nix path-info -r --store https://cache.nixos.org "$OUT" 2>/dev/null; \
            } | sort -u | wc -l | tr -d ' ')
          MISS=$(( TOTAL - HIT ))
          {
            echo "### Cache hit-rate (${{ matrix.name }})"
            echo ""
            echo "- total closure paths: $TOTAL"
            echo "- hit:  $HIT"
            echo "- miss: $MISS"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to Cachix
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        continue-on-error: true
        run: |
          OUT=$(readlink -f result)
          echo "Pushing $OUT to Cachix ..."
          nix path-info -r "$OUT" \
            | cachix push baleen-nix || echo "⚠️ Cache upload incomplete - continuing..."
